{% extends 'base.html' %}
{% block title %}Delete Task - ProjectFlow{% endblock %}
{% block page_title %}Delete Task{% endblock %}

{% block content %}
<div style="max-width:480px;">
  <div class="card">
    <div class="card-body" style="text-align:center;padding:40px;">
      <div style="font-size:52px;margin-bottom:16px;">&#9888;&#65039;</div>
      <h2 style="font-size:20px;font-weight:800;margin-bottom:8px;">Delete Task?</h2>
      <p style="color:var(--text-secondary);margin-bottom:24px;">
        Delete <strong>"{{ task.title }}"</strong>? This cannot be undone.
      </p>
      <form method="POST" style="display:flex;gap:12px;justify-content:center;">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">&#128465; Yes, Delete</button>
        <a href="{% url 'task_detail' task.pk %}" class="btn btn-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% extends 'core/base.html' %}
{% block title %}Login – ConnectHub{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">

        <div class="auth-header">
            <div class="auth-logo">◈</div>
            <h1>Welcome Back</h1>
            <p class="text-muted">Sign in to your ConnectHub account</p>
        </div>

        <form method="POST" class="auth-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       class="form-input" placeholder="Your username" required autofocus />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       class="form-input" placeholder="Your password" required />
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-large">Login</button>
        </form>

        <p class="auth-switch">
            Don't have an account? <a href="{% url 'register' %}">Sign up here</a>
        </p>
    </div>
</div>
{% endblock %}

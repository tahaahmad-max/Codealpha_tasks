{% extends 'core/base.html' %}
{% block title %}Edit Post – ConnectHub{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">

        <div class="form-card-header">
            <h1>Edit Post</h1>
            <p class="text-muted">Update your post</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="styled-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="id_caption">Caption</label>
                <textarea id="id_caption" name="caption" class="form-input form-textarea"
                          placeholder="What's on your mind?" rows="5" required>{{ form.caption.value|default:'' }}</textarea>
            </div>

            <!-- Show existing image if any -->
            {% if post.image %}
            <div class="form-group">
                <label>Current Image</label>
                <img src="{{ post.image.url }}" alt="Current" class="current-image-preview" />
            </div>
            {% endif %}

            <div class="form-group">
                <label for="id_image">Replace Image (optional)</label>
                <input type="file" id="id_image" name="image" accept="image/*" class="form-input file-input" />
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{% url 'post_detail' post.id %}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
